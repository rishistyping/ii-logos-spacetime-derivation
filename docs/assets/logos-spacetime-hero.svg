<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="1200" viewBox="0 0 3000 1200">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF7EE"/>
      <stop offset="0.55" stop-color="#F6F1E7"/>
      <stop offset="1" stop-color="#E8EDE5"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F233F" flood-opacity="0.12"/>
    </filter>
    <style>
      .brand { font-family: Avenir Next, Helvetica Neue, Arial, sans-serif; font-weight: 700; letter-spacing: 8px; }
      .title { font-family: Avenir Next, Helvetica Neue, Arial, sans-serif; font-weight: 800; letter-spacing: 0; }
      .body { font-family: Avenir Next, Helvetica Neue, Arial, sans-serif; font-weight: 500; letter-spacing: 0; }
      .mono { font-family: SFMono-Regular, Menlo, Consolas, monospace; font-weight: 650; letter-spacing: 0; }
      .small { font-size: 30px; fill: #5D6572; }
    </style>
  </defs>

<rect width="3000" height="1200" fill="url(#paper)"/>
<circle cx="2380" cy="250" r="520" fill="#E8EDE5" opacity="0.75"/>
<circle cx="2560" cy="760" r="360" fill="#DDE8DF" opacity="0.55"/>
<path d="M 0 940 C 520 840 860 1030 1350 910 C 1900 770 2290 910 3000 760 L 3000 1200 L 0 1200 Z" fill="#E1E8DF" opacity="0.62"/>
<text x="180" y="190" font-size="48" fill="#0F766E" class="brand" text-anchor="start">II LOGOS</text>
<text x="180" y="335" font-size="118" fill="#0F233F" class="title" text-anchor="start">A Brief Derivation</text>
<text x="180" y="470" font-size="118" fill="#0F233F" class="title" text-anchor="start">of Spacetime</text>
<text x="186" y="565" font-size="48" fill="#334155" class="body" text-anchor="start">The sign is structural. The magnitude is empirical.</text>
<text x="186" y="630" font-size="48" fill="#334155" class="body" text-anchor="start">The bridge is tracked claim by claim.</text>
<g filter="url(#softShadow)">
<rect x="1720" y="300" width="920" height="560" rx="34" fill="#FBF9F1" stroke="#0F233F" stroke-width="5"/>
<text x="1815" y="405" font-size="42" fill="#0F233F" class="title" text-anchor="start">v0.5 proof boundary</text>
<text x="1815" y="505" font-size="54" fill="#15803D" class="mono" text-anchor="start">A(λ)² = λI</text>
<text x="1815" y="590" font-size="46" fill="#0F766E" class="mono" text-anchor="start">Q(ℓ+) = Q(ℓ-) = 0</text>
<text x="1815" y="675" font-size="42" fill="#B88A2E" class="mono" text-anchor="start">Λ = 3λ,  λ > 0 ⇒ Λ > 0</text>
<text x="1815" y="770" font-size="36" fill="#8B3A4A" class="body" text-anchor="start">Physical arrow: Interpretation</text>
</g>
<path d="M 1660 900 C 1910 790 2170 980 2700 860" fill="none" stroke="#0F233F" stroke-width="3" opacity="0.18"/>
<path d="M 1660 928 C 1910 818 2170 1008 2700 888" fill="none" stroke="#0F233F" stroke-width="3" opacity="0.18"/>
<path d="M 1660 956 C 1910 846 2170 1036 2700 916" fill="none" stroke="#0F233F" stroke-width="3" opacity="0.18"/>
<path d="M 1660 984 C 1910 874 2170 1064 2700 944" fill="none" stroke="#0F233F" stroke-width="3" opacity="0.18"/>
<path d="M 1660 1012 C 1910 902 2170 1092 2700 972" fill="none" stroke="#0F233F" stroke-width="3" opacity="0.18"/>
<path d="M 1660 1040 C 1910 930 2170 1120 2700 1000" fill="none" stroke="#0F233F" stroke-width="3" opacity="0.18"/>
<path d="M 1660 1068 C 1910 958 2170 1148 2700 1028" fill="none" stroke="#0F233F" stroke-width="3" opacity="0.18"/>
<line x1="1680" y1="885" x2="2680" y2="885" stroke="#0F233F" stroke-width="3" opacity="0.28"/>
<line x1="2180" y1="410" x2="2180" y2="1010" stroke="#0F233F" stroke-width="3" opacity="0.28"/>
</svg>
