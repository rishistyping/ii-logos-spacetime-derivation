<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF7EE"/>
      <stop offset="0.55" stop-color="#F6F1E7"/>
      <stop offset="1" stop-color="#E8EDE5"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F233F" flood-opacity="0.12"/>
    </filter>
    <style>
      .brand { font-family: Avenir Next, Helvetica Neue, Arial, sans-serif; font-weight: 700; letter-spacing: 8px; }
      .title { font-family: Avenir Next, Helvetica Neue, Arial, sans-serif; font-weight: 800; letter-spacing: 0; }
      .body { font-family: Avenir Next, Helvetica Neue, Arial, sans-serif; font-weight: 500; letter-spacing: 0; }
      .mono { font-family: SFMono-Regular, Menlo, Consolas, monospace; font-weight: 650; letter-spacing: 0; }
      .small { font-size: 30px; fill: #5D6572; }
    </style>
  </defs>

<rect width="1600" height="900" fill="url(#paper)"/>
<text x="800" y="110" font-size="62" fill="#0F233F" class="title" text-anchor="middle">Verification Story</text>
<text x="800" y="165" font-size="30" fill="#5D6572" class="body" text-anchor="middle">Public narrative, proof authority, computed companions, and release gates.</text>
<g filter="url(#softShadow)">
<rect x="90" y="350" width="210" height="125" rx="24" fill="#FBF9F1" stroke="#0F233F" stroke-width="4"/>
<rect x="90" y="350" width="210" height="12" rx="6" fill="#0F766E"/>
<text x="195" y="408" font-size="34" fill="#0F233F" class="title" text-anchor="middle">Paper</text>
<text x="195" y="446" font-size="24" fill="#5D6572" class="body" text-anchor="middle">source</text>
</g>
<line x1="324" y1="412" x2="326" y2="412" stroke="#5D6572" stroke-width="4" stroke-linecap="round"/>
<path d="M 326 412 l -18 -10 l 4 10 l -4 10 z" fill="#5D6572"/>
<g filter="url(#softShadow)">
<rect x="350" y="350" width="210" height="125" rx="24" fill="#FBF9F1" stroke="#0F233F" stroke-width="4"/>
<rect x="350" y="350" width="210" height="12" rx="6" fill="#15803D"/>
<text x="455" y="408" font-size="34" fill="#0F233F" class="title" text-anchor="middle">Lean</text>
<text x="455" y="446" font-size="24" fill="#5D6572" class="body" text-anchor="middle">proof authority</text>
</g>
<line x1="584" y1="412" x2="586" y2="412" stroke="#5D6572" stroke-width="4" stroke-linecap="round"/>
<path d="M 586 412 l -18 -10 l 4 10 l -4 10 z" fill="#5D6572"/>
<g filter="url(#softShadow)">
<rect x="610" y="350" width="260" height="125" rx="24" fill="#FBF9F1" stroke="#0F233F" stroke-width="4"/>
<rect x="610" y="350" width="260" height="12" rx="6" fill="#B88A2E"/>
<text x="740" y="408" font-size="34" fill="#0F233F" class="title" text-anchor="middle">SymPy / Wolfram</text>
<text x="740" y="446" font-size="24" fill="#5D6572" class="body" text-anchor="middle">computed companions</text>
</g>
<line x1="894" y1="412" x2="896" y2="412" stroke="#5D6572" stroke-width="4" stroke-linecap="round"/>
<path d="M 896 412 l -18 -10 l 4 10 l -4 10 z" fill="#5D6572"/>
<g filter="url(#softShadow)">
<rect x="920" y="350" width="210" height="125" rx="24" fill="#FBF9F1" stroke="#0F233F" stroke-width="4"/>
<rect x="920" y="350" width="210" height="12" rx="6" fill="#334155"/>
<text x="1025" y="408" font-size="34" fill="#0F233F" class="title" text-anchor="middle">Visuals</text>
<text x="1025" y="446" font-size="24" fill="#5D6572" class="body" text-anchor="middle">reader layer</text>
</g>
<line x1="1154" y1="412" x2="1156" y2="412" stroke="#5D6572" stroke-width="4" stroke-linecap="round"/>
<path d="M 1156 412 l -18 -10 l 4 10 l -4 10 z" fill="#5D6572"/>
<g filter="url(#softShadow)">
<rect x="1180" y="350" width="210" height="125" rx="24" fill="#FBF9F1" stroke="#0F233F" stroke-width="4"/>
<rect x="1180" y="350" width="210" height="12" rx="6" fill="#0F766E"/>
<text x="1285" y="408" font-size="34" fill="#0F233F" class="title" text-anchor="middle">Checks</text>
<text x="1285" y="446" font-size="24" fill="#5D6572" class="body" text-anchor="middle">rerunnable gate</text>
</g>
<rect x="330" y="640" width="940" height="118" rx="22" fill="#E8EDE5" stroke="#0F766E" stroke-width="3"/>
<text x="800" y="692" font-size="32" fill="#0F233F" class="title" text-anchor="middle">Inspectable v0.5 result</text>
<text x="800" y="732" font-size="28" fill="#5D6572" class="body" text-anchor="middle">algebra proved; interpretation labeled</text>
</svg>
