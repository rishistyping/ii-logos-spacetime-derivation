<text x="800" y="761" font-size="28" fill="#8B3A4A" class="title" text-anchor="middle">interpretation boundary</text>
<text x="800" y="830" font-size="27" fill="#15803D" class="body" text-anchor="middle">Lean-proved: matrix spine, eigendirections, split form, Λ arithmetic</text>
<text x="800" y="866" font-size="25" fill="#8B3A4A" class="body" text-anchor="middle">Interpretation: geometric light-cone reading, horizon, redshift, arrow thesis</text>
