name: Python checks

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: python-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sympy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run Python checks
        run: bash scripts/check_python.sh
      - name: Check artifact drift
        run: bash scripts/check_artifacts.sh
      - name: Check truth surfaces
        run: uv run python scripts/check_truth_surface.py
