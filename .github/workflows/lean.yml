name: Lean

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: lean-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
      - name: Run Lean checks
        run: bash scripts/check_lean.sh
