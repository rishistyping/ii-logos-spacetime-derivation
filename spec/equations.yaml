equations:
  - id: EQ-A
    expression: "A(lambda) = [[0, -lambda], [-1, 0]]"
    status: Lean-proved
    lean_declaration: timeEvolutionMatrix
    artifact: "results/time_evolution_summary.json"

  - id: EQ-TRACE
    expression: "trace(A(lambda)) = 0"
    status: Lean-proved
    lean_declaration: trace_zero
    artifact: "results/regression_summary.json"

  - id: EQ-DET
    expression: "det(A(lambda)) = -lambda"
    status: Lean-proved
    lean_declaration: det_eq_neg_lambda
    artifact: "results/regression_summary.json"

  - id: EQ-CHARPOLY
    expression: "charpoly_A(x) = x^2 - lambda"
    status: Lean-proved
    lean_declaration: char_poly
    artifact: "results/regression_summary.json"

  - id: EQ-SQUARE
    expression: "A(lambda)^2 = lambda I"
    status: Lean-proved
    lean_declaration: square_eq_lambda_identity
    artifact: "results/regression_summary.json"

  - id: EQ-EIGEN-PLUS
    expression: "A(lambda) ellPlus(lambda) = sqrt(lambda) ellPlus(lambda), for lambda >= 0"
    status: Lean-proved
    lean_declaration: ellPlus_eigen
    artifact: "results/eigendirection_summary.json"

  - id: EQ-EIGEN-MINUS
    expression: "A(lambda) ellMinus(lambda) = -sqrt(lambda) ellMinus(lambda), for lambda >= 0"
    status: Lean-proved
    lean_declaration: ellMinus_eigen
    artifact: "results/eigendirection_summary.json"

  - id: EQ-SPLIT-QUADRATIC-SCALE
    expression: "Q(lambda, r*v) = r^2 Q(lambda, v), where Q(k,p)=k^2-lambda*p^2"
    status: Lean-proved
    lean_declaration: splitQuadratic_scale
    artifact: "results/null_bridge_summary.json"

  - id: EQ-SPLIT-NULL-PLUS
    expression: "Q(lambda, ellPlus(lambda)) = 0, for lambda >= 0"
    status: Lean-proved
    lean_declaration: ellPlus_splitQuadratic_zero
    artifact: "results/null_bridge_summary.json"

  - id: EQ-SPLIT-NULL-MINUS
    expression: "Q(lambda, ellMinus(lambda)) = 0, for lambda >= 0"
    status: Lean-proved
    lean_declaration: ellMinus_splitQuadratic_zero
    artifact: "results/null_bridge_summary.json"

  - id: EQ-LAMBDA-GENERAL-COMPUTED
    expression: "Lambda(d,lambda) = ((d - 1)(d - 2)/2) lambda"
    status: Computed here
    artifact: "results/lambda_sign_summary.json"

  - id: EQ-LAMBDA-D4
    expression: "cosmologicalFromCurvature 4 lambda = 3*lambda"
    status: Lean-proved
    lean_declaration: cosmologicalFromCurvature_four
    artifact: "results/lambda_sign_summary.json"

  - id: EQ-LAMBDA-D4-POSITIVE
    expression: "lambda > 0 implies cosmologicalFromCurvature 4 lambda > 0"
    status: Lean-proved
    lean_declaration: cosmologicalFromCurvature_four_positive
    artifact: "results/lambda_sign_summary.json"
  - id: EQ-LAMBDA-GENERAL-LEAN
    expression: "cosmologicalFromCurvature d lambda = ((d - 1)(d - 2)/2) lambda"
    status: Lean-proved
    lean_declaration: cosmologicalFromCurvature_general
    artifact: "results/lambda_sign_summary.json"

  - id: EQ-LAMBDA-NONNEG
    expression: "if 3 <= d and 0 <= lambda then 0 <= cosmologicalFromCurvature d lambda"
    status: Lean-proved
    lean_declaration: cosmologicalFromCurvature_nonneg_of_nonneg
    artifact: "results/lambda_sign_summary.json"
  - id: EQ-LAMBDA-POSITIVE
    expression: "if 3 <= d and 0 < lambda then 0 < cosmologicalFromCurvature d lambda"
    status: Lean-proved
    lean_declaration: cosmologicalFromCurvature_positive_of_positive
    artifact: "results/lambda_sign_summary.json"

  - id: EQ-BRACKET-SCALE
    expression: "translationBracket a b (lam1 + lam2) has symbolic generator J_ab and coefficient lam1+lam2"
    status: Lean-proved
    lean_declaration: translationBracket_scale
    artifact: "results/bracket_surface_summary.json"
  - id: EQ-BRACKET-ZERO
    expression: "translationBracket a b 0 = <0,J_ab>"
    status: Lean-proved
    lean_declaration: translationBracket_zero
    artifact: "results/bracket_surface_summary.json"
  - id: EQ-BRACKET-STABLE
    expression: "translationBracket a b lam has fixed generator J_ab and coefficient lambda"
    status: Lean-proved
    lean_declaration: translationBracket_stable_structure
    artifact: "results/bracket_surface_summary.json"

  - id: EQ-SPLIT-CONE
    expression: "splitCone(lam,v) := splitQuadratic(lam,v)=0"
    status: Lean-proved
    lean_declaration: splitCone
    artifact: "results/split_cone_summary.json"

  - id: EQ-SPLIT-CONE-SCALE
    expression: "if splitCone lam v then splitCone lam (Vec2.scale r v) in the cone-packet"
    status: Lean-proved
    lean_declaration: splitCone_scale
    artifact: "results/split_cone_summary.json"
