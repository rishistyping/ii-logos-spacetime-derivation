claims:
  - id: ST-01
    statement: "Constant-curvature translation-bracket surface [P_a, P_b] = lambda J_ab"
    status: Interpretation
    lean_target: "Spacetime/ConstantCurvature.lean"
    notes: "Scaffolded as symbolic bracket data; not a full Lie-algebra exhaustiveness theorem."

  - id: ST-03
    statement: "A(lambda) = [[0, -lambda], [-1, 0]]"
    status: Lean-proved
    lean_target: "Spacetime/TimeEvolutionMatrix.lean"
    lean_declarations:
      - timeEvolutionMatrix
    computational_artifact: "results/time_evolution_summary.json"
    notes: "Promoted in v0.2 after lake build; SymPy artifact remains a computational companion."

  - id: ST-04
    statement: "trace(A)=0, det(A)=-lambda, charpoly(A)=x^2-lambda, A^2=lambda I"
    status: Lean-proved
    lean_target: "Spacetime/TimeEvolutionMatrix.lean"
    lean_declarations:
      - trace_zero
      - det_eq_neg_lambda
      - char_poly
      - square_eq_lambda_identity
    computational_artifact: "results/regression_summary.json"

  - id: ST-05-POSITIVE
    statement: "lambda > 0 has det(A)<0 and satisfies the hyperbolic algebraic branch marker"
    status: Lean-proved
    lean_target: "Spacetime/SignVerdict.lean"
    lean_declarations:
      - positive_branch_det_negative
      - positiveBranch_hyperbolicAlgebraic
    computational_artifact: "results/branch_summary.json"
    notes: "SymPy also records the real split-root explainer artifact; the Lean promotion is the determinant/branch-marker fact."

  - id: ST-05-ZERO
    statement: "lambda = 0 corresponds to the parabolic / nilpotent branch"
    status: Lean-proved
    lean_target: "Spacetime/SignVerdict.lean"
    lean_declarations:
      - zero_branch_square_zero
      - zeroBranch_parabolicAlgebraic
    computational_artifact: "results/branch_summary.json"

  - id: ST-05-NEGATIVE
    statement: "lambda < 0 has det(A)>0 and trace(A)=0, satisfying the elliptic algebraic branch marker"
    status: Lean-proved
    lean_target: "Spacetime/SignVerdict.lean"
    lean_declarations:
      - negative_branch_det_positive
      - negativeBranch_ellipticAlgebraic
    computational_artifact: "results/branch_summary.json"

  - id: ST-06-EIGENDIRECTIONS
    statement: "For lambda >= 0, ellPlus=(-sqrt(lambda),1) and ellMinus=(sqrt(lambda),1) are nonzero eigenvectors of A(lambda) with eigenvalues sqrt(lambda) and -sqrt(lambda); for lambda > 0 they are distinct."
    status: Lean-proved
    lean_target: "Spacetime/EigenDirections.lean"
    lean_declarations:
      - Vec2
      - Mat2.mulVec
      - ellPlus
      - ellMinus
      - ellPlus_nonzero
      - ellMinus_nonzero
      - ellPlus_eigen
      - ellMinus_eigen
      - ellPlus_ne_ellMinus
    computational_artifact: "results/eigendirection_summary.json"
    notes: "Promoted in v0.3 as an algebraic eigendirection bridge only; null-vector and light-cone readings remain interpretation."

  - id: ST-07-SPLIT-NULL
    statement: "For lambda >= 0, ellPlus and ellMinus vanish against the split quadratic form Q(k,p)=k^2-lambda*p^2, and Q scales quadratically."
    status: Lean-proved
    lean_target: "Spacetime/NullBridge.lean"
    lean_declarations:
      - splitQuadratic
      - IsSplitNull
      - splitQuadratic_scale
      - ellPlus_splitQuadratic_zero
      - ellMinus_splitQuadratic_zero
      - ellPlus_isSplitNull
      - ellMinus_isSplitNull
    computational_artifact: "results/null_bridge_summary.json"
    notes: "Promoted in v0.5 as an algebraic split-form bridge only; physical readings remain interpretation."

  - id: ST-08-LAMBDA-SIGN
    statement: "In four spacetime dimensions, cosmologicalFromCurvature 4 lambda = 3*lambda, and lambda > 0 implies cosmologicalFromCurvature 4 lambda > 0."
    status: Lean-proved
    lean_target: "Spacetime/SignatureBridge.lean"
    lean_declarations:
      - cosmologicalFromCurvature_four
      - cosmologicalFromCurvature_four_positive
    computational_artifact: "results/lambda_sign_summary.json"
    notes: "Promoted in v0.5 as an arithmetic bridge only; observational or physical cosmological readings remain outside this claim."

  - id: ST-09-SPLIT-CONE
    statement: "For nonnegative lambda, splitCone(lam,v) is defined by splitQuadratic(lam,v)=0 and is closed under scaling; ellPlus and ellMinus lie on it."
    status: Lean-proved
    lean_target: "Spacetime/NullConeSplit.lean"
    lean_declarations:
      - splitCone
      - splitCone_scale
      - splitCone_ellPlus_zero
      - splitCone_ellMinus_zero
    computational_artifact: "results/split_cone_summary.json"
    notes: "Algebraic cone-closure packet for ST-09. Physical interpretations remain interpretation."

  - id: ST-10-LAMBDA-GENERAL-SIGN
    statement: "In dimensions d>=3, `cosmologicalFromCurvature d lambda = ((d-1)(d-2)/2) lambda`; with 0<=lambda gives nonnegative Lambda and 0<lambda gives positive Lambda."
    status: Lean-proved
    lean_target: "Spacetime/SignatureBridge.lean"
    lean_declarations:
      - cosmologicalFromCurvature_general
      - cosmologicalFromCurvature_nonneg_of_nonneg
      - cosmologicalFromCurvature_positive_of_positive
    computational_artifact: "results/lambda_sign_summary.json"
    notes: "Safe assumption packet with explicit dimension/sign conditions."

  - id: ST-11-BRACKET-SURFACE
    statement: "Constant-curvature bracket packet remains symbolic but is strengthened with coefficient and generator hygiene lemmas for explicit scaffold checks."
    status: Lean-proved
    lean_target: "Spacetime/ConstantCurvature.lean"
    lean_declarations:
      - translationBracket_scale
      - translationBracket_zero
      - translationBracket_stable_structure
    computational_artifact: "results/bracket_surface_summary.json"
    notes: "No Lie-algebra exhaustiveness claim is introduced."

  - id: ST-12-SPHERE-COMPACTNESS
    statement: "Sphere compactness / finiteness bridge is an external mathematical input used in the paper's physical selection step."
    status: Imported theorem
    notes: "This bridge is treated as an imported external premise until separately formalized."

  - id: ST-13-WICK-ROTATION
    statement: "Wick-rotation / Lorentzian signature reading is a physical interpretation bridge."
    status: Interpretation
    notes: "Current scope keeps signature-change reading in Interpretation until explicitly formalized."

  - id: ST-14-EIGENDIRECTION-LIGHT-CONE
    statement: "Eigenspaces are geometric light-cone directions."
    status: Interpretation
    notes: "Algebraic eigendirections are Lean-proved; geometric interpretation remains pending."

  - id: ST-15-HORIZON-REDSHIFT-ARROW
    statement: "Horizon, redshift, and arrow-of-time reading."
    status: Interpretation
    notes: "Interpretation only; no physical bridge theorem has been formalized yet."

  - id: PHYS-01
    statement: "t > 0, c > 0, and Lambda > 0 share the same sign"
    status: Interpretation
    notes: "Full physical bridge remains outside v0 proof authority."
